{% extends "base.html" %}

{% block content %}
<div class="container mt-4" style="display: flex; flex-direction: column; align-items: center; text-align: center; font-family: 'Segoe UI', Roboto, sans-serif; padding-bottom: 50px;">
    
    <h2 style="font-size: 28px; font-weight: 800; color: #2d3748; margin-bottom: 12px; margin-top: 20px;">
        {{ video.title }}
    </h2>
    <p style="font-size: 18px; color: #4a5568; max-width: 800px; margin-bottom: 30px; line-height: 1.6;">
        {{ video.description }}
    </p>
    
    <div class="video-responsive">
    <iframe src="{{ video.url }}"  title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
</div>
    <br>
    
    <a href="/video" class="btn btn-primary mt-4" style="background-color: #4f46e5; border: none; padding: 12px 30px; font-size: 16px; font-weight: 600; border-radius: 8px; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);">
        <i class="fa-solid fa-arrow-left"></i> Back to Videos
    </a>

</div>
{% endblock %}
